name: Build, Scan and Push to ECR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | \
          docker login --username AWS --password-stdin 320060061347.dkr.ecr.eu-north-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t portfolio .

      # 🔐 Trivy scan step (added here)
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: 'portfolio'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Tag image
        run: |
          docker tag portfolio 320060061347.dkr.ecr.eu-north-1.amazonaws.com/portfolio:latest

      - name: Push to ECR
        run: |
          docker push 320060061347.dkr.ecr.eu-north-1.amazonaws.com/portfolio:latest
